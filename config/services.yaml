# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    # Wrap PriceParser with cache and circuit breaker
    App\Infrastructure\Parser\Decorator\CachedPriceParserDecorator:
        decorates: 'App\Domain\Service\PriceParserInterface'
        arguments:
            $inner: '@App\Infrastructure\Parser\Decorator\CachedPriceParserDecorator.inner'
            $appCache: '@cache.app'
            $logger: '@logger'

    App\Domain\Service\PriceParserInterface:
        alias: App\Infrastructure\Parser\PriceParser

    App\Domain\Repository\OrderRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\OrderRepository

    App\Domain\Repository\OrderSearchInterface:
        alias: App\Infrastructure\Search\CombinedSearchProvider

    App\Infrastructure\Search\CombinedSearchProvider:
        arguments:
            $primarySearch: '@App\Infrastructure\Search\ManticoreOrderSearch'
            $fallbackSearch: '@App\Infrastructure\Search\SqlOrderSearchProvider'
            $appCache: '@cache.app'

    # Decorators for reference repositories caching
    App\Infrastructure\Persistence\Doctrine\Repository\Decorator\ArticleRepositoryCacheDecorator:
        decorates: 'App\Domain\Repository\ArticleRepositoryInterface'
        arguments:
            $inner: '@App\Infrastructure\Persistence\Doctrine\Repository\Decorator\ArticleRepositoryCacheDecorator.inner'
            $referenceCache: '@app.reference_cache'

    App\Infrastructure\Persistence\Doctrine\Repository\Decorator\PayTypeRepositoryCacheDecorator:
        decorates: 'App\Domain\Repository\PayTypeRepositoryInterface'
        arguments:
            $inner: '@App\Infrastructure\Persistence\Doctrine\Repository\Decorator\PayTypeRepositoryCacheDecorator.inner'
            $referenceCache: '@app.reference_cache'

    App\Infrastructure\Persistence\Doctrine\Repository\PayTypeRepository:
        arguments:
            $referenceCache: '@app.reference_cache'

    App\Infrastructure\Persistence\Doctrine\Repository\ArticleRepository:
        arguments:
            $referenceCache: '@app.reference_cache'

    App\Infrastructure\Persistence\Doctrine\Repository\OrderRepository:
        arguments:
            $statsCache: '@app.stats_cache'

    App\Infrastructure\Search\ManticoreOrderSearch:
        arguments:
            $host: '%env(MANTICORE_HOST)%'
            $port: '%env(int:MANTICORE_PORT)%'

    App\Infrastructure\Soap\SoapServerFactory:
        arguments:
            $wsdlPath: '%kernel.project_dir%/public/wsdl/order.wsdl'
            $cacheEnabled: '%env(bool:SOAP_CACHE_ENABLED)%'
